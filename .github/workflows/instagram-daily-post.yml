# 📱 FishandTips - Instagram Daily Auto-Post
# 
# Pubblica automaticamente un carousel Instagram ogni giorno
# Piano settimanale:
#   Lunedì    07:00 - Tutorial (Esperto)
#   Martedì   12:30 - Meme (Divertente)
#   Mercoledì 19:00 - Errori (Provocatorio)
#   Giovedì   12:30 - Quiz (Amico)
#   Venerdì   07:00 - Confronto (Esperto)
#   Sabato    10:00 - Top 5 (Amico)
#   Domenica  18:00 - Storia (Storytelling)

name: 📱 Instagram Daily Post

on:
  # Schedule disabilitato - post automatici disattivati
  # schedule:
  #   - cron: '0 6 * * 1'   # Lunedì 07:00 IT (06:00 UTC)
  #   - cron: '30 11 * * 2' # Martedì 12:30 IT
  #   - cron: '0 18 * * 3'  # Mercoledì 19:00 IT
  #   - cron: '30 11 * * 4' # Giovedì 12:30 IT
  #   - cron: '0 6 * * 5'   # Venerdì 07:00 IT
  #   - cron: '0 9 * * 6'   # Sabato 10:00 IT
  #   - cron: '0 17 * * 0'  # Domenica 18:00 IT
  
  # Esecuzione solo manuale
  workflow_dispatch:
    inputs:
      content_type:
        description: 'Tipo di contenuto'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - tutorial
          - meme
          - mistakes
          - quiz
          - comparison
          - toplist
          - story
      topic:
        description: 'Argomento (lascia vuoto per auto)'
        required: false
        default: ''
      tone:
        description: 'Tono (lascia vuoto per auto)'
        required: false
        default: ''

jobs:
  post-instagram:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 📚 Install dependencies
        run: npm ci
      
      - name: 🎭 Install Puppeteer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2t64 || sudo apt-get install -y libgbm-dev libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1
      
      - name: 📅 Determine content type
        id: content
        run: |
          # Se esecuzione manuale con tipo specificato
          if [ "${{ github.event.inputs.content_type }}" != "" ] && [ "${{ github.event.inputs.content_type }}" != "auto" ]; then
            echo "type=${{ github.event.inputs.content_type }}" >> $GITHUB_OUTPUT
            echo "tone=${{ github.event.inputs.tone }}" >> $GITHUB_OUTPUT
            echo "topic=${{ github.event.inputs.topic }}" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Usa lo script Node per selezionare topic variati
          OUTPUT=$(node scripts/daily-topic-selector.js 2>&1 | tail -3)
          
          TYPE=$(echo "$OUTPUT" | grep "^type=" | cut -d= -f2)
          TONE=$(echo "$OUTPUT" | grep "^tone=" | cut -d= -f2)
          TOPIC=$(echo "$OUTPUT" | grep "^topic=" | cut -d= -f2)
          
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "tone=$TONE" >> $GITHUB_OUTPUT
          echo "topic=$TOPIC" >> $GITHUB_OUTPUT
          
          echo "📅 Contenuto selezionato:"
          echo "   Tipo: $TYPE"
          echo "   Tono: $TONE"
          echo "   Topic: $TOPIC"
      
      - name: 🎨 Generate and publish carousel
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          echo "📱 Pubblicazione Instagram"
          echo "📊 Tipo: ${{ steps.content.outputs.type }}"
          echo "🎭 Tono: ${{ steps.content.outputs.tone }}"
          echo "📝 Topic: ${{ steps.content.outputs.topic }}"
          
          node scripts/batch-instagram-poster.js \
            --single \
            --type "${{ steps.content.outputs.type }}" \
            --topic "${{ steps.content.outputs.topic }}" \
            --tone "${{ steps.content.outputs.tone }}"
      
      - name: 📊 Log risultato
        if: always()
        run: |
          echo "✅ Workflow completato"
          echo "📅 Data: $(date)"
          echo "📱 Tipo post: ${{ steps.content.outputs.type }}"

